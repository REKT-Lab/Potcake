<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potcake Viewer: Bahamas Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        /* This handles the image background swap */
        #outputCanvas { 
            width: 100%; 
            border-radius: 2rem; 
            background-size: cover; 
            background-position: center;
            transition: background 0.5s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-8">
        <h1 class="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
            POTCAKE VIEWER
        </h1>
        <p class="text-zinc-500 text-[10px] tracking-[0.3em] uppercase mt-1">Bahamas Edition</p>
    </header>

    <div class="w-full max-w-sm glass rounded-[2.5rem] p-5 mb-6 shadow-2xl">
        <div class="flex gap-3 mb-5">
            <input id="tokenId" type="number" placeholder="ID" class="bg-transparent flex-1 px-4 py-2 border-b border-zinc-800 focus:outline-none focus:border-cyan-500 transition-colors">
            <button onclick="fetchAndProcess()" class="bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-2 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">FETCH</button>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="toggleRemove()" id="removeBtn" class="text-[10px] font-bold py-3 rounded-xl border border-zinc-800 transition-all uppercase tracking-widest bg-white/5">
                BG REMOVER: OFF
            </button>
            <button onclick="toggleBahamas()" id="bahamasBtn" class="text-[10px] font-bold py-3 rounded-xl border border-cyan-900/50 transition-all uppercase tracking-widest bg-cyan-950/20 text-cyan-400">
                BAHAMAS: OFF
            </button>
        </div>
    </div>

    <div class="w-full max-w-sm relative group">
        <canvas id="outputCanvas" class="shadow-2xl"></canvas>
        <div id="status" class="text-center mt-6 text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Ready for the beach</div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC_URL = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let originalImg = new Image();
        let isRemoving = false;
        let isBahamas = false;

        async function fetchAndProcess() {
            const val = document.getElementById('tokenId').value;
            if(!val) return;
            const id = parseInt(val) - 1;
            
            document.getElementById('status').innerText = "Traveling to ApeChain...";
            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(id);
                const meta = await (await fetch(uri.replace("ipfs://", "https://ipfs.io/ipfs/"))).json();
                
                originalImg.crossOrigin = "anonymous";
                originalImg.src = meta.image.replace("ipfs://", "https://ipfs.io/ipfs/");
                originalImg.onload = () => render();
            } catch (e) { document.getElementById('status').innerText = "Lost at sea (Fetch error)."; }
        }

        function render() {
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImg, 0, 0);
            
            if (isRemoving) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const r = data[0], g = data[1], b = data[2];
                
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.abs(data[i]-r) < 40 && Math.abs(data[i+1]-g) < 40 && Math.abs(data[i+2]-b) < 40) {
                        data[i+3] = 0;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }
            document.getElementById('status').innerText = "Vibe established.";
        }

        function toggleRemove() {
            isRemoving = !isRemoving;
            const btn = document.getElementById('removeBtn');
            btn.innerText = `BG REMOVER: ${isRemoving ? 'ON' : 'OFF'}`;
            btn.className = isRemoving ? "text-[10px] font-bold py-3 rounded-xl border border-green-500 bg-green-500/10 text-green-500 uppercase tracking-widest" : "text-[10px] font-bold py-3 rounded-xl border border-zinc-800 bg-white/5 uppercase tracking-widest";
            render();
        }

        function toggleBahamas() {
            isBahamas = !isBahamas;
            const btn = document.getElementById('bahamasBtn');
            btn.innerText = `BAHAMAS: ${isBahamas ? 'ON' : 'OFF'}`;
            
            if(isBahamas) {
                // High-def Bahamas Beach from Unsplash
                canvas.style.backgroundImage = "url('https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800&q=80')";
                btn.className = "text-[10px] font-bold py-3 rounded-xl border border-cyan-400 bg-cyan-400/20 text-cyan-400 uppercase tracking-widest";
            } else {
                canvas.style.backgroundImage = "none";
                btn.className = "text-[10px] font-bold py-3 rounded-xl border border-zinc-800 bg-white/5 uppercase tracking-widest";
            }
        }
    </script>
</body>
</html>
