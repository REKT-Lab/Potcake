<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potcake Paradise | Survivor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #07090a; color: white; font-family: 'Georgia', serif; overflow-x: hidden; touch-action: none; margin: 0; }
        .wood-panel { 
            background: linear-gradient(135deg, #3d2b1f 0%, #2a1d15 100%);
            border: 4px solid #1a110a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 1.5rem; position: relative;
        }
        .wood-panel::after {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            opacity: 0.15; pointer-events: none; border-radius: 1.2rem;
        }
        #gameCanvas { width: 100%; max-width: 400px; border-radius: 2rem; border: 6px solid #2a1d15; background: #111; display: block; margin: 0 auto; transition: box-shadow 0.5s; }
        #game-over-screen, #instruction-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: rgba(10, 5, 0, 0.94); align-items: center; justify-content: center; 
            flex-direction: column; backdrop-filter: blur(10px); 
        }
        #instruction-overlay { display: flex; }
        .gold-text { color: #fbbf24; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-wood { background: #5d4037; border-bottom: 4px solid #3e2723; transition: all 0.1s; color: #ffe0b2; }
        .btn-wood:active { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-island { background: #2e7d32; border-bottom: 4px solid #1b5e20; color: #e8f5e9; }
        .btn-sea { background: #0277bd; border-bottom: 4px solid #01579b; color: #e1f5fe; }
        
        .loader { width: 30px; height: 30px; border: 4px solid #fbbf24; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ui-fade { transition: opacity 0.4s ease; opacity: 1; }
        .hidden-ui { opacity: 0 !important; pointer-events: none !important; }
        #countdown-box { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); flex-direction: column; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="countdown-box">
        <h1 id="count-num" class="text-9xl font-black italic gold-text">3</h1>
    </div>

    <div id="instruction-overlay">
        <div class="wood-panel p-8 max-w-xs text-center">
            <h2 class="text-3xl font-black gold-text mb-4 italic">ISLAND RULES</h2>
            <div class="space-y-3 text-orange-100 text-sm mb-6 font-sans text-left">
                <p>❤️ Start with **2 Lives**. Don't miss!</p>
                <p>✨ **Big Bones** = +3 Points Surge!</p>
                <p>🐶 Catch the **Potcake** for +1 Life.</p>
                <p>🌅 Survive to see the sunset!</p>
            </div>
            <button onclick="hideInstructions()" class="btn-wood w-full py-4 rounded-xl font-black uppercase text-xs tracking-widest">Enter Paradise</button>
        </div>
    </div>

    <div id="main-header" class="mt-2 mb-2 text-center ui-fade">
        <h1 class="text-3xl font-black italic tracking-tighter gold-text">POTCAKE PARADISE</h1>
    </div>

    <div id="score-bar" class="w-full max-w-sm wood-panel py-3 px-6 mb-3 flex justify-between items-center z-20 ui-fade">
        <div class="flex flex-col">
            <span class="text-[9px] uppercase tracking-widest text-orange-200/50 font-bold">Score</span>
            <span id="score-display" class="text-2xl font-black italic text-white leading-none">0</span>
        </div>
        <div id="life-display" class="text-xl">❤️❤️</div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] uppercase tracking-widest text-orange-200/50 font-bold">Best</span>
            <span id="high-score-display" class="text-2xl font-black italic gold-text leading-none">0</span>
        </div>
    </div>

    <div id="input-panel" class="w-full max-w-sm wood-panel p-4 mb-4 z-10 ui-fade">
        <div id="load-box" class="flex flex-col gap-3 relative z-10">
            <div class="flex gap-2 w-full">
                <input id="tokenId" type="number" placeholder="Enter ID (e.g. 50)" class="bg-black/40 flex-1 px-4 py-3 rounded-xl border border-white/10 text-white outline-none">
                <button onclick="fetchPotcake()" class="bg-amber-100 text-amber-900 px-6 py-3 rounded-xl font-black text-xs">LOAD</button>
            </div>
            <button id="start-btn" onclick="startGame()" class="hidden bg-green-600 text-white w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Start Game</button>
        </div>
        <div id="loading-state" class="hidden flex items-center justify-center gap-4 py-2 relative z-10">
            <span class="loader"></span>
            <p class="text-[10px] font-bold gold-text uppercase">Syncing NFT Data...</p>
        </div>
    </div>

    <div class="w-full max-w-sm relative">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="status-text" class="grid grid-cols-2 gap-3 mt-6 ui-fade">
            <a href="https://potcakerescue.com" target="_blank" class="btn-wood btn-island py-3 rounded-xl text-center font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">🏝️ Website</a>
            <a href="https://opensea.io/collection/potcake-rescue" target="_blank" class="btn-wood btn-sea py-3 rounded-xl text-center font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">🌊 OpenSea</a>
        </div>
        
        <div id="game-over-screen">
            <div id="go-wood" class="wood-panel p-8 flex flex-col items-center min-w-[280px]">
                <p class="text-[10px] font-bold gold-text uppercase tracking-widest mb-1">Total Bones</p>
                <p id="final-score" class="text-7xl font-black mb-8 italic text-white">0</p>
                <div id="game-over-btns" class="flex flex-col gap-3 w-full ui-fade relative z-10">
                    <button onclick="startGame()" class="btn-wood py-4 rounded-xl font-black text-xs uppercase tracking-widest">Retry</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="shareScore()" class="bg-sky-900 text-white py-3 rounded-xl font-black text-[9px] uppercase">X Post</button>
                        <button onclick="saveScreenshot(event)" class="bg-emerald-800 text-white py-3 rounded-xl font-black text-[9px] uppercase">Save 📸</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADDR = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let potcakeImg = new Image();
        let backgroundImg = new Image();
        backgroundImg.crossOrigin = "anonymous";
        backgroundImg.src = "https://images.unsplash.com/photo-1548574505-5e239809ee19?w=800";

        // Initial setup for potcakeImg to prevent crash if not loaded
        potcakeImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🐶%3C/text%3E%3C/svg%3E";

        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        const catchSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
        const failSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3');
        bgMusic.loop = true;

        let gameActive = false, score = 0, lives = 2, playerX = 160, playerWidth = 80, items = [], gameSpeed = 3.5;
        let highScore = localStorage.getItem('potcakeBest') || 0;
        document.getElementById('high-score-display').innerText = highScore;

        function hideInstructions() { document.getElementById('instruction-overlay').style.display = 'none'; }
        
        function updateLifeUI() {
            document.getElementById('life-display').innerText = "❤️".repeat(lives);
        }

        async function fetchPotcake() {
            const idInput = document.getElementById('tokenId').value;
            if(!idInput) return;
            
            document.getElementById('load-box').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                const contract = new ethers.Contract(ADDR, ["function tokenURI(uint256) view returns (string)"], provider);
                
                // Fetch URI from ApeChain
                const uri = await contract.tokenURI(parseInt(idInput));
                const httpUri = uri.replace("ipfs://", "https://ipfs.io/ipfs/");
                
                const response = await fetch(httpUri);
                const meta = await response.json();
                
                const imageUri = meta.image.replace("ipfs://", "https://ipfs.io/ipfs/");
                
                potcakeImg = new Image();
                potcakeImg.crossOrigin = "anonymous";
                potcakeImg.src = imageUri;
                
                potcakeImg.onload = () => {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('load-box').classList.remove('hidden');
                    document.getElementById('start-btn').classList.remove('hidden');
                    renderPreview();
                };
            } catch(e) {
                console.error(e);
                alert("Could not load NFT. Try a different ID or check connection.");
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('load-box').classList.remove('hidden');
            }
        }

        function renderPreview() {
            ctx.drawImage(backgroundImg, 0, 0, 400, 400);
            ctx.drawImage(potcakeImg, 160, 300, 80, 80);
        }

        function startGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            score = 0; lives = 2; items = []; gameSpeed = 3.5; playerX = 160;
            updateLifeUI();
            document.getElementById('score-display').innerText = "0";
            
            let count = 3;
            const cBox = document.getElementById('countdown-box');
            const cNum = document.getElementById('count-num');
            cBox.style.display = 'flex';
            cNum.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if(count > 0) { cNum.innerText = count; } else {
                    clearInterval(timer); cBox.style.display = 'none';
                    bgMusic.play().catch(e => {}); gameActive = true; gameLoop();
                }
            }, 800);
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, 400, 400);
            ctx.drawImage(backgroundImg, 0, 0, 400, 400);
            
            // Sunset tint
            if(score > 15) {
                ctx.fillStyle = "rgba(255, 100, 0, 0.15)";
                ctx.fillRect(0,0,400,400);
            }

            ctx.drawImage(potcakeImg, playerX, 300, playerWidth, playerWidth);

            if (Math.random() < 0.03 + (score * 0.001)) {
                let type = "normal";
                let r = Math.random();
                if (r < 0.04) type = "life";
                else if (r < 0.14) type = "mega";
                
                items.push({ x: Math.random() * 350, y: -20, speed: gameSpeed + (Math.random() * 2), type: type });
            }

            items.forEach((item, index) => {
                item.y += item.speed;
                ctx.font = item.type === "mega" ? "50px serif" : "30px serif";
                let icon = item.type === "life" ? "🐶" : "🦴";
                ctx.fillText(icon, item.x, item.y);

                if (item.y > 300 && item.y < 380 && item.x > playerX - 15 && item.x < playerX + playerWidth + 5) {
                    if (item.type === "mega") score += 3;
                    else if (item.type === "life") { if(lives < 3) lives++; updateLifeUI(); }
                    else score++;
                    
                    items.splice(index, 1);
                    catchSfx.currentTime = 0; catchSfx.play().catch(e => {});
                    document.getElementById('score-display').innerText = score;
                }

                if (item.y > 410) {
                    items.splice(index, 1);
                    if (item.type !== "life") {
                        lives--;
                        updateLifeUI();
                        if (lives <= 0) endGame();
                    }
                }
            });
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false; bgMusic.pause(); failSfx.play().catch(e => {});
            if (score > highScore) { 
                highScore = score; localStorage.setItem('potcakeBest', highScore); 
                document.getElementById('high-score-display').innerText = highScore; 
            }
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            playerX = (x / rect.width * 400) - playerWidth / 2;
            playerX = Math.max(0, Math.min(320, playerX));
        });

        function saveScreenshot() {
            const link = document.createElement('a');
            link.download = 'potcake_score.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function shareScore() {
            const text = `I just hit ${score} bones in Potcake Paradise! 🏝️🦴\n\nPlay here: [Your Link]\n\n@potcakenft`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
