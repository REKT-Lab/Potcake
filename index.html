<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Potcake Paradise 🏝️🦴">
    <meta name="twitter:description" content="Play with your Potcake NFT on ApeChain! Catch bones, level up, and glow gold.">
    <meta name="twitter:image" content="https://rekt-lab.github.io/preview.png">
    <meta name="twitter:site" content="@potcakenft">

    <title>Potcake Paradise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; margin: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        #gameCanvas { width: 100%; max-width: 400px; border-radius: 2.5rem; background: #111; display: block; margin: 0 auto; transition: box-shadow 0.3s ease; }
        #game-over-screen { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; backdrop-blur: 10px; }
        
        /* Floating animation for the Rank */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        #rank-badge { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="my-6 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-cyan-500">POTCAKE PARADISE</h1>
        <div class="flex justify-center gap-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 mt-1">
            <p>Bones: <span id="score-display" class="text-white">0</span></p>
            <button onclick="toggleMute()" id="mute-btn" class="text-cyan-500 underline">Mute</button>
        </div>
    </div>

    <div class="w-full max-w-sm glass rounded-[2rem] p-4 mb-4 z-10">
        <div class="flex gap-2">
            <input id="tokenId" type="number" placeholder="Potcake ID" class="bg-white/5 flex-1 px-4 py-3 rounded-xl border border-white/10 focus:outline-none text-white">
            <button onclick="fetchPotcake()" class="bg-white text-black px-6 py-3 rounded-xl font-black text-xs">LOAD</button>
            <button id="start-btn" onclick="startGame()" class="hidden bg-cyan-500 text-black px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Play</button>
        </div>
    </div>

    <div class="w-full max-w-sm relative">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="status" class="text-center mt-4 text-[10px] text-zinc-600 uppercase tracking-widest font-bold italic">Ready for ApeChain Action</div>
        
        <div id="game-over-screen">
            <div id="rank-badge" class="text-8xl font-black mb-2 text-yellow-400 italic drop-shadow-xl">S</div>
            <h2 id="rank-title" class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-6">Island Legend</h2>
            <p id="final-score" class="text-6xl font-black mb-10 italic">0</p>
            <div class="flex flex-col gap-3 w-4/5">
                <button onclick="startGame()" class="bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Try Again</button>
                <button onclick="shareScore()" class="bg-zinc-800 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Share on X</button>
            </div>
        </div>
    </div>

    <script>
        const ADDR = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let potcakeImg = new Image();
        let backgroundImg = new Image();
        backgroundImg.crossOrigin = "anonymous";
        backgroundImg.src = "https://images.unsplash.com/photo-1548574505-5e239809ee19?w=800";

        // Audio Engine
        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        const catchSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
        const failSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3');
        bgMusic.loop = true;
        let isMuted = false;

        let gameActive = false, score = 0, playerX = 160, playerWidth = 80, items = [];
        let gameSpeed = 3.5;

        function toggleMute() {
            isMuted = !isMuted;
            bgMusic.muted = isMuted; catchSfx.muted = isMuted; failSfx.muted = isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "Unmute" : "Mute";
        }

        async function fetchPotcake() {
            const idInput = document.getElementById('tokenId').value;
            if(!idInput) return;
            const id = parseInt(idInput) - 1;
            document.getElementById('status').innerText = "Connecting to ApeChain...";
            
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                const contract = new ethers.Contract(ADDR, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(id);
                const meta = await (await fetch(uri.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/"))).json();
                
                potcakeImg = new Image();
                potcakeImg.crossOrigin = "anonymous";
                potcakeImg.src = meta.image.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/");
                potcakeImg.onload = () => {
                    ctx.drawImage(backgroundImg, 0, 0, 400, 400);
                    ctx.drawImage(potcakeImg, 160, 280, 80, 80);
                    document.getElementById('start-btn').classList.remove('hidden');
                    document.getElementById('status').innerText = "NFT Loaded: Ready to Play";
                };
            } catch(e) { document.getElementById('status').innerText = "ApeChain Load Error"; }
        }

        function startGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            if(!isMuted) bgMusic.play().catch(e => {});
            gameActive = true; score = 0; items = []; gameSpeed = 3.5;
            document.getElementById('score-display').innerText = "0";
            gameLoop();
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, 400, 400);
            ctx.drawImage(backgroundImg, 0, 0, 400, 400);

            // --- GOLDEN GLOW EVOLUTION ---
            if (score >= 5) {
                ctx.save();
                let glowPower = Math.min(score * 1.5, 50); // Glow grows with score
                ctx.shadowBlur = glowPower;
                ctx.shadowColor = "#fbbf24"; // Gold color
                ctx.drawImage(potcakeImg, playerX, 300, playerWidth, playerWidth);
                ctx.restore();
            } else {
                ctx.drawImage(potcakeImg, playerX, 300, playerWidth, playerWidth);
            }

            // Spawn Logic
            if (Math.random() < 0.03 + (score * 0.001)) {
                items.push({ x: Math.random() * 350, y: -20, speed: gameSpeed + (Math.random() * 2), rot: 0 });
            }

            items.forEach((item, index) => {
                item.y += item.speed;
                item.rot += 0.1; 
                
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(item.rot);
                ctx.font = "35px serif";
                ctx.textAlign = "center";
                ctx.fillText("🦴", 0, 0);
                ctx.restore();

                // Collision
                if (item.y > 300 && item.y < 380 && item.x > playerX - 10 && item.x < playerX + playerWidth + 10) {
                    items.splice(index, 1);
                    score++;
                    gameSpeed += 0.12; 
                    catchSfx.currentTime = 0; catchSfx.play().catch(e => {});
                    if ("vibrate" in navigator) navigator.vibrate(40);
                    document.getElementById('score-display').innerText = score;
                }
                if (item.y > 400) endGame();
            });
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            bgMusic.pause(); bgMusic.currentTime = 0;
            if(!isMuted) failSfx.play().catch(e => {});
            if ("vibrate" in navigator) navigator.vibrate(200);
            
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            const b = document.getElementById('rank-badge');
            if (score > 40) { b.innerText = "S"; b.style.color = "#fbbf24"; } 
            else if (score > 15) { b.innerText = "A"; b.style.color = "#a78bfa"; } 
            else { b.innerText = "B"; b.style.color = "#94a3b8"; }
        }

        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            playerX = (x / rect.width * 400) - 40;
            if (playerX < 0) playerX = 0; if (playerX > 320) playerX = 320;
        });

        function shareScore() {
            const currentUrl = window.location.href;
            const rank = document.getElementById('rank-badge').innerText;
            const text = `I just hit rank ${rank} (${score} bones! 🦴) in Potcake Paradise! My Potcake is GLOWING GOLD! 🌟🐾\n\nCan you beat me @potcakenft?\n\nPlay here:`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(currentUrl)}`);
        }
    </script>
</body>
</html>
