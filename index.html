<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Potcake Paradise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background: #07090a; color: white; font-family: 'Georgia', serif; overflow: hidden; touch-action: none; margin: 0; }
        
        .wood-panel { 
            background: linear-gradient(135deg, #3d2b1f 0%, #2a1d15 100%);
            border: 4px solid #1a110a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 1.5rem;
            position: relative;
        }
        .wood-panel::after {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/wood-pattern.png');
            opacity: 0.2; pointer-events: none; border-radius: 1.2rem;
        }

        #gameCanvas { 
            width: 100%; max-width: 400px; border-radius: 2rem; 
            border: 6px solid #2a1d15; background: #111; display: block; margin: 0 auto; 
        }

        #game-over-screen, #instruction-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: rgba(10, 5, 0, 0.94); align-items: center; justify-content: center; 
            flex-direction: column; backdrop-filter: blur(10px); 
        }
        #instruction-overlay { display: flex; }

        .gold-text { color: #fbbf24; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-wood { background: #5d4037; border-bottom: 4px solid #3e2723; transition: all 0.1s; color: #ffe0b2; }
        .btn-wood:active { transform: translateY(2px); border-bottom-width: 2px; }
        
        .loader { width: 30px; height: 30px; border: 4px solid #fbbf24; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .ui-fade { transition: opacity 0.4s ease; opacity: 1; }
        .hidden-ui { opacity: 0 !important; pointer-events: none !important; }

        #screenshot-hint { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: rgba(0,0,0,0.9); padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #fbbf24; }
        #view-mode-return { display: none; position: fixed; bottom: 30px; z-index: 150; background: #fbbf24; color: #3d2b1f; padding: 12px 24px; border-radius: 30px; font-weight: 900; font-size: 12px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #countdown-box { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); flex-direction: column; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="screenshot-hint">
        <p class="gold-text font-black text-xl mb-2">📸 SNAPSHOT READY</p>
        <p class="text-white text-xs opacity-80">Clearing UI for the perfect shot...</p>
    </div>

    <div id="countdown-box">
        <h1 id="count-num" class="text-9xl font-black italic gold-text">3</h1>
    </div>

    <button id="view-mode-return" onclick="exitViewMode()">Return to Game</button>

    <div id="instruction-overlay">
        <div class="wood-panel p-8 max-w-xs text-center">
            <h2 class="text-3xl font-black gold-text mb-4 italic">ISLAND RULES</h2>
            <div class="space-y-4 text-orange-100 text-sm mb-8 font-sans">
                <p>🐾 Load your Potcake ID.</p>
                <p>🦴 Catch bones to score.</p>
                <p>🌟 Reach 5 bones for the <span class="gold-text font-bold">GOLD GLOW!</span></p>
            </div>
            <button onclick="hideInstructions()" class="btn-wood w-full py-4 rounded-xl font-black uppercase text-xs tracking-widest">Enter Paradise</button>
        </div>
    </div>

    <div id="main-header" class="mt-4 mb-2 text-center ui-fade">
        <h1 class="text-3xl font-black italic tracking-tighter gold-text">POTCAKE PARADISE</h1>
    </div>

    <div id="score-bar" class="w-full max-w-sm wood-panel py-3 px-6 mb-3 flex justify-between items-center z-20 ui-fade">
        <div class="flex flex-col">
            <span class="text-[9px] uppercase tracking-widest text-orange-200/50 font-bold">Current Score</span>
            <span id="score-display" class="text-2xl font-black italic text-white leading-none">0</span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] uppercase tracking-widest text-orange-200/50 font-bold">Island Best</span>
            <span id="high-score-display" class="text-2xl font-black italic gold-text leading-none">0</span>
        </div>
    </div>

    <div id="input-panel" class="w-full max-w-sm wood-panel p-4 mb-4 z-10 ui-fade">
        <div id="load-box" class="flex flex-col gap-3 relative z-10">
            <div class="flex gap-2 w-full">
                <input id="tokenId" type="number" placeholder="Enter ID" class="bg-black/40 flex-1 px-4 py-3 rounded-xl border border-white/10 text-white outline-none">
                <button onclick="fetchPotcake()" class="bg-amber-100 text-amber-900 px-6 py-3 rounded-xl font-black text-xs">LOAD</button>
            </div>
            <button id="start-btn" onclick="startGame()" class="hidden bg-green-600 text-white w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Start Game</button>
        </div>
        <div id="loading-state" class="hidden flex items-center justify-center gap-4 py-2 relative z-10">
            <span class="loader"></span>
            <p class="text-[10px] font-bold gold-text uppercase">Syncing <span id="load-pc">0</span>%</p>
        </div>
    </div>

    <div class="w-full max-w-sm relative">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="status-text" class="text-center mt-3 text-[9px] text-orange-200/20 uppercase tracking-[0.3em] font-bold ui-fade">ApeChain Connectivity: Active</div>
        
        <div id="game-over-screen">
            <div id="go-wood" class="wood-panel p-8 flex flex-col items-center min-w-[280px]">
                <p class="text-[10px] font-bold gold-text uppercase tracking-widest mb-1">Total Bones</p>
                <p id="final-score" class="text-7xl font-black mb-8 italic text-white">0</p>
                <div id="game-over-btns" class="flex flex-col gap-3 w-full ui-fade relative z-10">
                    <button onclick="startGame()" class="btn-wood py-4 rounded-xl font-black text-xs uppercase tracking-widest">Retry</button>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="shareScore()" class="bg-sky-900 text-white py-3 rounded-xl font-black text-[9px] uppercase">X Post</button>
                        <button onclick="saveScreenshot(event)" class="bg-emerald-800 text-white py-3 rounded-xl font-black text-[9px] uppercase">Save 📸</button>
                        <button onclick="screenshotMode()" class="bg-amber-900 text-amber-100 py-3 rounded-xl font-black text-[9px] uppercase tracking-tighter">View 🏝️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADDR = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let potcakeImg = new Image(), backgroundImg = new Image();
        backgroundImg.crossOrigin = "anonymous";
        backgroundImg.src = "https://images.unsplash.com/photo-1548574505-5e239809ee19?w=800";

        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        const catchSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
        const failSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3');
        bgMusic.loop = true;
        let isMuted = false, gameActive = false, score = 0, playerX = 160, playerWidth = 80, items = [], gameSpeed = 3.5, woofTimer = 0;

        let highScore = localStorage.getItem('potcakeBest') || 0;
        document.getElementById('high-score-display').innerText = highScore;

        function hideInstructions() { document.getElementById('instruction-overlay').style.display = 'none'; }
        
        function toggleMute() { isMuted = !isMuted; bgMusic.muted = isMuted; catchSfx.muted = isMuted; failSfx.muted = isMuted; document.getElementById('mute-btn').innerText = isMuted ? "Unmute" : "Mute"; }

        function screenshotMode() {
            const hint = document.getElementById('screenshot-hint');
            hint.style.display = 'block';
            setTimeout(() => {
                hint.style.display = 'none';
                document.getElementById('game-over-screen').style.display = 'none';
                document.getElementById('main-header').classList.add('hidden-ui');
                document.getElementById('input-panel').classList.add('hidden-ui');
                document.getElementById('score-bar').classList.add('hidden-ui');
                document.getElementById('status-text').classList.add('hidden-ui');
                document.getElementById('view-mode-return').style.display = "block";
                renderStaticFrame(true);
            }, 1500);
        }

        function exitViewMode() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('main-header').classList.remove('hidden-ui');
            document.getElementById('input-panel').classList.remove('hidden-ui');
            document.getElementById('score-bar').classList.remove('hidden-ui');
            document.getElementById('status-text').classList.remove('hidden-ui');
            document.getElementById('view-mode-return').style.display = "none";
            renderStaticFrame(false);
        }

        function renderStaticFrame(withDetails) {
            ctx.drawImage(backgroundImg, 0, 0, 400, 400);
            ctx.save();
            if (score >= 5) { ctx.shadowBlur = 40; ctx.shadowColor = "#fbbf24"; }
            ctx.drawImage(potcakeImg, playerX, 300, playerWidth, playerWidth);
            ctx.restore();
            if (withDetails) {
                ctx.fillStyle = "white"; ctx.font = "bold 32px Georgia";
                ctx.fillText(`BONES: ${score}`, 20, 50);
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.font = "italic 12px Georgia";
                ctx.textAlign = "right";
                ctx.fillText("Made with 🥥 in Potcake Paradise", 380, 385);
            }
        }

        function saveScreenshot(e) {
            renderStaticFrame(true);
            const link = document.createElement('a');
            link.download = `Potcake_Score_${score}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            renderStaticFrame(false);
            e.target.innerText = "SAVED! ✅";
            setTimeout(() => { e.target.innerText = "SAVE 📸"; }, 2000);
        }

        async function fetchPotcake() {
            const idInput = document.getElementById('tokenId').value;
            if(!idInput) return;
            document.getElementById('load-box').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            let pc = 0;
            let timer = setInterval(() => {
                pc += Math.floor(Math.random() * 20);
                if(pc >= 100) { pc = 100; clearInterval(timer); }
                document.getElementById('load-pc').innerText = pc;
            }, 80);
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                const contract = new ethers.Contract(ADDR, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(parseInt(idInput) - 1);
                const meta = await (await fetch(uri.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/"))).json();
                potcakeImg = new Image();
                potcakeImg.crossOrigin = "anonymous";
                potcakeImg.src = meta.image.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/");
                potcakeImg.onload = () => {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('load-box').classList.remove('hidden');
                    document.getElementById('start-btn').classList.remove('hidden');
                    renderStaticFrame(false);
                };
            } catch(e) { alert("NFT Error!"); }
        }

        function startGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            score = 0; items = []; gameSpeed = 3.5; playerX = 160;
            document.getElementById('score-display').innerText = "0";
            
            let count = 3;
            const cBox = document.getElementById('countdown-box');
            const cNum = document.getElementById('count-num');
            cBox.style.display = 'flex';
            cNum.innerText = count;

            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    cNum.innerText = count;
                } else {
                    clearInterval(timer);
                    cBox.style.display = 'none';
                    if(!isMuted) bgMusic.play().catch(e => {});
                    gameActive = true;
                    gameLoop();
                }
            }, 800);
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, 400, 400);
            ctx.drawImage(backgroundImg, 0, 0, 400, 400);
            ctx.save();
            if (score >= 5) { ctx.shadowBlur = Math.min(score * 2, 50); ctx.shadowColor = "#fbbf24"; }
            ctx.drawImage(potcakeImg, playerX, 300, playerWidth, playerWidth);
            ctx.restore();

            if (woofTimer > 0) {
                ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.strokeStyle = "black";
                ctx.lineWidth = 4; ctx.strokeText("WOOF!", playerX + 10, 290); ctx.fillText("WOOF!", playerX + 10, 290);
                woofTimer--;
            }

            if (Math.random() < 0.03 + (score * 0.0015)) {
                items.push({ x: Math.random() * 350, y: -20, speed: gameSpeed + (Math.random() * 2), rot: 0 });
            }

            items.forEach((item, index) => {
                item.y += item.speed; item.rot += 0.1;
                ctx.save();
                ctx.translate(item.x, item.y); ctx.rotate(item.rot);
                ctx.font = "35px serif"; ctx.textAlign = "center"; ctx.fillText("🦴", 0, 0);
                ctx.restore();

                if (item.y > 300 && item.y < 380 && item.x > playerX - 10 && item.x < playerX + playerWidth + 10) {
                    items.splice(index, 1);
                    score++; gameSpeed += 0.12; woofTimer = 30;
                    catchSfx.currentTime = 0; catchSfx.play().catch(e => {});
                    if ("vibrate" in navigator) navigator.vibrate(40);
                    document.getElementById('score-display').innerText = score;
                }
                if (item.y > 400) endGame();
            });
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            bgMusic.pause(); bgMusic.currentTime = 0;
            if(!isMuted) failSfx.play().catch(e => {});
            if ("vibrate" in navigator) navigator.vibrate(200);
            if (score > highScore) {
                highScore = score; localStorage.setItem('potcakeBest', highScore);
                document.getElementById('high-score-display').innerText = highScore;
            }
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            playerX = (x / rect.width * 400) - playerWidth / 2;
            if (playerX < 0) playerX = 0; if (playerX > 320) playerX = 320;
        });

        function shareScore() {
            const text = `I just caught ${score} bones in Potcake Paradise! 🏝️🦴\n\nCan you beat my high score @potcakenft?\n\nPlay here:`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`);
        }
    </script>
</body>
</html>
