<div class="w-full max-w-sm mb-6">
    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 ml-2">Choose Your Island</p>
    <div class="grid grid-cols-4 gap-2">
        <button onclick="changeScene(0)" class="h-12 rounded-xl border border-white/10 bg-cover bg-center overflow-hidden active:scale-95 transition-transform" style="background-image: url('https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=200&q=60')"></button>
        <button onclick="changeScene(1)" class="h-12 rounded-xl border border-white/10 bg-cover bg-center overflow-hidden active:scale-95 transition-transform" style="background-image: url('https://images.unsplash.com/photo-1589394815804-c147da211d43?auto=format&fit=crop&w=200&q=60')"></button>
        <button onclick="changeScene(2)" class="h-12 rounded-xl border border-white/10 bg-cover bg-center overflow-hidden active:scale-95 transition-transform" style="background-image: url('https://images.unsplash.com/photo-1510414842594-a61c69b5ae57?auto=format&fit=crop&w=200&q=60')"></button>
        <button onclick="changeScene(3)" class="h-12 rounded-xl border border-white/10 bg-cover bg-center overflow-hidden active:scale-95 transition-transform" style="background-image: url('https://images.unsplash.com/photo-1520116468816-95b69f847357?auto=format&fit=crop&w=200&q=60')"></button>
    </div>
</div>

<script>
// --- ADD TO YOUR GLOBAL VARIABLES ---
const SCENES = [
    "https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=1200&q=80", // Classic Nassau
    "https://images.unsplash.com/photo-1589394815804-c147da211d43?auto=format&fit=crop&w=1200&q=80", // Turquoise Exuma
    "https://images.unsplash.com/photo-1510414842594-a61c69b5ae57?auto=format&fit=crop&w=1200&q=80", // Sunset Palms
    "https://images.unsplash.com/photo-1520116468816-95b69f847357?auto=format&fit=crop&w=1200&q=80"  // Aerial Reef
];
let currentSceneIndex = 0;

// --- UPDATE YOUR RENDER FUNCTION ---
function renderMaskedScene() {
    canvas.width = potcakeImg.width;
    canvas.height = potcakeImg.height;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isIsland) {
        const bgImg = new Image();
        bgImg.crossOrigin = "anonymous";
        bgImg.src = SCENES[currentSceneIndex]; // Uses the selected scene
        
        bgImg.onload = () => {
            // Draw background first
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            
            // Apply the cookie-cutter mask
            ctx.globalCompositeOperation = "destination-in";
            ctx.drawImage(maskCanvas, 0, 0); 
            
            // Draw the Potcake on top
            ctx.globalCompositeOperation = "source-over";
            ctx.drawImage(potcakeImg, 0, 0);
        };
    } else {
        // Standard draw if island mode is off
        ctx.drawImage(potcakeImg, 0, 0);
    }
}

function changeScene(index) {
    currentSceneIndex = index;
    isIsland = true; // Auto-enable island mode when a scene is picked
    document.getElementById('islandBtn').classList.add('active-mode');
    renderMaskedScene();
}
</script>
