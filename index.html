<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potcake Viewer: Bahamas Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        #outputCanvas { 
            width: 100%; 
            border-radius: 2rem; 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.5s ease;
            display: block;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-8">
        <h1 class="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
            POTCAKE VIEWER
        </h1>
        <p class="text-zinc-500 text-[10px] tracking-[0.3em] uppercase mt-1">Direct from ApeChain</p>
    </header>

    <div class="w-full max-w-sm glass rounded-[2.5rem] p-5 mb-6 shadow-2xl">
        <div class="flex gap-3 mb-5">
            <input id="tokenId" type="number" placeholder="Enter ID" class="bg-transparent flex-1 px-4 py-2 border-b border-zinc-800 focus:outline-none focus:border-cyan-500 text-white">
            <button onclick="fetchAndProcess()" class="bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-2 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">FETCH</button>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="toggleRemove()" id="removeBtn" class="text-[10px] font-bold py-3 rounded-xl border border-zinc-800 bg-white/5 uppercase tracking-widest">
                REMOVE BG: OFF
            </button>
            <button onclick="toggleBahamas()" id="bahamasBtn" class="text-[10px] font-bold py-3 rounded-xl border border-zinc-800 bg-white/5 uppercase tracking-widest text-cyan-400">
                BAHAMAS: OFF
            </button>
        </div>
    </div>

    <div class="w-full max-w-sm relative">
        <canvas id="outputCanvas"></canvas>
        <div id="status" class="text-center mt-6 text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Ready for the beach</div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        // List of RPCs to try if one is down
        const RPC_URLS = [
            "https://rpc.apechain.com/http",
            "https://apechain.drpc.org",
            "https://apechain.calderachain.xyz/http"
        ];
        
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let originalImg = new Image();
        let isRemoving = false;
        let isBahamas = false;

        async function fetchAndProcess() {
            const val = document.getElementById('tokenId').value;
            if(!val) return;
            const id = parseInt(val) - 1; 
            
            document.getElementById('status').innerText = "Connecting to ApeChain...";
            
            try {
                // Try the first working RPC
                let provider;
                for (let url of RPC_URLS) {
                    try {
                        provider = new ethers.JsonRpcProvider(url);
                        await provider.getBlockNumber();
                        break;
                    } catch(e) { continue; }
                }

                const contract = new ethers.Contract(CONTRACT_ADDRESS, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(id);
                
                const gateways = ["https://ipfs.io/ipfs/", "https://cloudflare-ipfs.com/ipfs/", "https://gateway.pinata.cloud/ipfs/"];
                const cleanHash = uri.replace("ipfs://", "");
                
                document.getElementById('status').innerText = "Fetching Image...";
                
                const metaRes = await fetch(gateways[0] + cleanHash);
                const meta = await metaRes.json();
                
                originalImg = new Image();
                originalImg.crossOrigin = "anonymous";
                // Using a specific gateway for the image to ensure CORS works for the background remover
                originalImg.src = meta.image.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/");
                
                originalImg.onload = () => {
                    render();
                    document.getElementById('status').innerText = `Viewing Potcake #${val}`;
                };
                
                originalImg.onerror = () => {
                    document.getElementById('status').innerText = "Image load failed. Trying backup...";
                    originalImg.src = meta.image.replace("ipfs://", gateways[2]);
                };

            } catch (e) { 
                console.error(e);
                document.getElementById('status').innerText = "Network Error. Refresh and try again."; 
            }
        }

        function render() {
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImg, 0, 0);
            
            if (isRemoving) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const r = data[0], g = data[1], b = data[2];
                
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.abs(data[i]-r) < 60 && Math.abs(data[i+1]-g) < 60 && Math.abs(data[i+2]-b) < 60) {
                        data[i+3] = 0;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function toggleRemove() {
            isRemoving = !isRemoving;
            document.getElementById('removeBtn').innerText = `REMOVE BG: ${isRemoving ? 'ON' : 'OFF'}`;
            document.getElementById('removeBtn').style.borderColor = isRemoving ? '#22c55e' : '#27272a';
            render();
        }

        function toggleBahamas() {
            isBahamas = !isBahamas;
            document.getElementById('bahamasBtn').innerText = `BAHAMAS: ${isBahamas ? 'ON' : 'OFF'}`;
            if(isBahamas) {
                canvas.style.backgroundImage = "url('https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800&q=80')";
            } else {
                canvas.style.backgroundImage = "none";
            }
        }
    </script>
</body>
</html>
