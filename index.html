<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potcake Viewer: Ultra Rare</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* The Holographic Shimmer */
        .holo-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.1) 45%, rgba(100,200,255,0.2) 50%, rgba(255,100,255,0.2) 55%, transparent 60%);
            background-size: 200% 200%;
            mix-blend-mode: color-dodge;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .holo-active .holo-overlay { opacity: 1; animation: holo-shift 3s infinite linear; }
        @keyframes holo-shift { 0% { background-position: 200% 200%; } 100% { background-position: -200% -200%; } }

        #outputCanvas { 
            width: 100%; border-radius: 2.5rem; background-size: cover; background-position: center;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 255, 0.2); position: absolute; top: 0; z-index: 20; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="mt-8 mb-4 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-white drop-shadow-2xl">POTCAKE</h1>
        <div class="flex items-center justify-center gap-2 mt-1">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <p class="text-[9px] text-zinc-400 uppercase tracking-[0.4em] font-bold">ApeChain Mainnet Live</p>
        </div>
    </div>

    <div class="w-full max-w-sm glass rounded-[3rem] p-6 mb-6 shadow-2xl relative overflow-hidden">
        <div class="flex gap-3 mb-6 relative z-10">
            <input id="tokenId" type="number" placeholder="ID #" class="bg-white/5 flex-1 px-5 py-3 rounded-2xl border border-white/10 focus:outline-none focus:border-cyan-500 text-xl font-bold">
            <button onclick="fetchAndProcess()" class="bg-white text-black px-6 py-3 rounded-2xl font-black text-sm active:scale-90 transition-transform">SCAN</button>
        </div>
        
        <div class="grid grid-cols-3 gap-2 relative z-10">
            <button onclick="toggleRemove()" id="removeBtn" class="text-[8px] font-black py-3 rounded-xl border border-white/10 bg-white/5 uppercase tracking-widest">Clear BG</button>
            <button onclick="toggleBahamas()" id="bahamasBtn" class="text-[8px] font-black py-3 rounded-xl border border-white/10 bg-white/5 uppercase tracking-widest">Island</button>
            <button onclick="toggleHolo()" id="holoBtn" class="text-[8px] font-black py-3 rounded-xl border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 uppercase tracking-widest">Holo On</button>
        </div>
    </div>

    <div id="cardContainer" class="w-full max-w-sm relative perspective-1000">
        <div id="viewframe" class="relative rounded-[2.5rem] overflow-hidden">
            <div class="holo-overlay"></div>
            <div class="scanline"></div>
            <canvas id="outputCanvas"></canvas>
        </div>
        
        <div class="mt-6 flex justify-between items-end px-4">
            <div>
                <h2 id="potcakeName" class="text-3xl font-black italic tracking-tighter leading-none mb-1">---</h2>
                <p id="status" class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Awaiting Input...</p>
            </div>
            <button onclick="downloadPotcake()" class="bg-zinc-900 p-4 rounded-full hover:bg-zinc-800 active:scale-90 transition-all border border-white/5">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC_URL = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let originalImg = new Image();
        let isRemoving = false;
        let isBahamas = false;
        let isHolo = true;

        async function fetchAndProcess() {
            const val = document.getElementById('tokenId').value;
            if(!val) return;
            const id = parseInt(val) - 1; 
            document.getElementById('status').innerText = "Decrypting Metadata...";
            
            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(id);
                const meta = await (await fetch(uri.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/"))).json();
                
                originalImg = new Image();
                originalImg.crossOrigin = "anonymous";
                originalImg.src = meta.image.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/");
                originalImg.onload = () => {
                    render();
                    document.getElementById('potcakeName').innerText = `PTCK #${val}`;
                    document.getElementById('status').innerText = "Scan Complete";
                    document.getElementById('cardContainer').classList.add('holo-active');
                };
            } catch (e) { document.getElementById('status').innerText = "Index Error"; }
        }

        function render() {
            canvas.width = originalImg.width; canvas.height = originalImg.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImg, 0, 0);
            if (isRemoving) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const r = data[0], g = data[1], b = data[2];
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.abs(data[i]-r) < 60 && Math.abs(data[i+1]-g) < 60 && Math.abs(data[i+2]-b) < 60) data[i+3] = 0;
                }
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function toggleRemove() { isRemoving = !isRemoving; render(); }
        function toggleBahamas() { 
            isBahamas = !isBahamas; 
            canvas.style.backgroundImage = isBahamas ? "url('https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800&q=80')" : "none";
        }
        function toggleHolo() {
            isHolo = !isHolo;
            document.getElementById('cardContainer').classList.toggle('holo-active', isHolo);
        }

        function downloadPotcake() {
            const link = document.createElement('a');
            link.download = `Potcake-Lab.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // Tilt Effect for Mobile
        window.addEventListener('deviceorientation', (e) => {
            if (!e.beta) return;
            const tiltX = e.gamma / 20;
            const tiltY = (e.beta - 45) / 20;
            canvas.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
        });
    </script>
</body>
</html>
