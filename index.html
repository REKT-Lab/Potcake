<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potcake Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: system-ui, sans-serif; }
        .action-btn { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .action-btn:active { transform: scale(0.95); background: #222; }
        .active-mode { border-color: #06b6d4; color: #06b6d4; background: rgba(6, 182, 212, 0.1); }
        #canvas-wrap { position: relative; width: 100%; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); aspect-ratio: 1/1; background: #000; }
        canvas { width: 100%; height: 100%; display: block; object-fit: contain; background-size: cover; background-position: center; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center p-5 min-h-screen">

    <div class="w-full max-w-sm flex justify-between items-center mb-8 mt-4">
        <h1 class="text-2xl font-black italic tracking-tighter">POTCAKE <span class="text-cyan-500">VIEWER</span></h1>
        <div class="px-3 py-1 bg-zinc-900 border border-zinc-800 rounded-full text-[9px] font-bold uppercase tracking-widest text-zinc-500">ApeChain</div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-4 gap-2 mb-4">
        <input id="tokenId" type="number" placeholder="ID #" class="col-span-3 bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-xl font-bold focus:outline-none focus:border-cyan-500 transition-all">
        <button onclick="fetchPotcake()" class="bg-white text-black rounded-2xl font-black text-xs hover:bg-zinc-200 active:scale-90 transition-all">GO</button>
    </div>

    <div class="w-full max-w-sm">
        <div id="canvas-wrap">
            <canvas id="mainCanvas"></canvas>
            <div id="env-glow" class="absolute inset-0 pointer-events-none transition-opacity opacity-0" style="background: radial-gradient(circle at 50% 120%, rgba(6, 182, 212, 0.3), transparent 70%);"></div>
        </div>
        
        <div class="mt-6 flex justify-between items-center px-2">
            <div>
                <h2 id="displayName" class="text-3xl font-black italic tracking-tight">#---</h2>
                <p id="statusMsg" class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mt-1">Ready to explore</p>
            </div>
            <button onclick="downloadImage()" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 active:scale-90 transition-all">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-3 mt-8">
        <button id="bgBtn" onclick="toggleRemove()" class="action-btn">Remove BG</button>
        <button id="islandBtn" onclick="toggleIsland()" class="action-btn">Bahamas Mode</button>
    </div>

    <script>
        const CONTRACT = "0xb9a48902dccdf4fef09ab6b46be4161552519898";
        const RPC = "https://rpc.apechain.com/http";
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let potcakeImg = new Image();
        let isRemoving = false;
        let isIsland = false;

        async function fetchPotcake() {
            const val = document.getElementById('tokenId').value;
            if(!val) return;
            const id = parseInt(val) - 1;
            
            updateStatus("Connecting...");
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                const contract = new ethers.Contract(CONTRACT, ["function tokenURI(uint256) view returns (string)"], provider);
                const uri = await contract.tokenURI(id);
                const meta = await (await fetch(uri.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/"))).json();
                
                potcakeImg = new Image();
                potcakeImg.crossOrigin = "anonymous";
                potcakeImg.src = meta.image.replace("ipfs://", "https://cloudflare-ipfs.com/ipfs/");
                
                potcakeImg.onload = () => {
                    render();
                    document.getElementById('displayName').innerText = `#${val}`;
                    updateStatus("Scan Success");
                };
            } catch (e) { updateStatus("Error Fetching"); }
        }

        function render() {
            canvas.width = potcakeImg.width;
            canvas.height = potcakeImg.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(potcakeImg, 0, 0);
            
            if (isRemoving) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const r = data[0], g = data[1], b = data[2];
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.abs(data[i]-r) < 55 && Math.abs(data[i+1]-g) < 55 && Math.abs(data[i+2]-b) < 55) data[i+3] = 0;
                }
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function toggleRemove() {
            isRemoving = !isRemoving;
            document.getElementById('bgBtn').classList.toggle('active-mode', isRemoving);
            render();
        }

        function toggleIsland() {
            isIsland = !isIsland;
            document.getElementById('islandBtn').classList.toggle('active-mode', isIsland);
            canvas.style.backgroundImage = isIsland ? "url('https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800&q=80')" : "none";
            document.getElementById('env-glow').style.opacity = isIsland ? "1" : "0";
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = `potcake-viewer.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function updateStatus(txt) { document.getElementById('statusMsg').innerText = txt; }
    </script>
</body>
</html>
