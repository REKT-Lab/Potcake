<div id="weather-effect" class="absolute inset-0 pointer-events-none z-20"></div>

<script>
// --- THE "NEVER DONE BEFORE" LOGIC: REAL-TIME SYNC ---
function applyEnvironmentalVibe() {
    const hour = new Date().getHours();
    const weatherLayer = document.getElementById('weather-effect');
    const canvas = document.getElementById('mainCanvas');
    
    // 1. NIGHT VIBE (8 PM - 6 AM)
    if (hour >= 20 || hour < 6) {
        // Deep blue moonlight overlay
        weatherLayer.style.background = "linear-gradient(to bottom, rgba(0,20,50,0.4), rgba(0,0,10,0.7))";
        canvas.style.filter = "brightness(0.7) contrast(1.1) saturate(0.8) sepia(0.2)";
        document.getElementById('status').innerText = "🌙 Midnight in the Bahamas";
    } 
    // 2. GOLDEN HOUR (6 PM - 8 PM or 6 AM - 8 AM)
    else if ((hour >= 18 && hour < 20) || (hour >= 6 && hour < 8)) {
        // Warm orange/pink sunset glow
        weatherLayer.style.background = "linear-gradient(to top, rgba(255,100,0,0.2), transparent)";
        canvas.style.filter = "brightness(1.1) saturate(1.4) hue-rotate(-10deg)";
        document.getElementById('status').innerText = "🌅 Golden Hour Vibe";
    }
    // 3. HIGH NOON (Normal)
    else {
        weatherLayer.style.background = "none";
        canvas.style.filter = "none";
        document.getElementById('status').innerText = "☀️ Island Sun Active";
    }
}

// Call this inside your render() function to sync the NFT with the real world
applyEnvironmentalVibe();
</script>
